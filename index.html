<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID BOOKS | Existential & Philosophical Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #b89c7d; /* Muted Gold/Old Paper */
            --bg: #0a0a0a;
            --card: #151515;
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Sophisticated Navbar */
        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 1.5rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--accent);
            letter-spacing: 3px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--accent); }

        /* Minimalist Hero */
        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid #222;
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        }

        .hero h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 3rem; 
            margin-bottom: 10px; 
            color: #fff;
        }

        .hero p { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            color: var(--accent); 
            font-size: 1.1rem;
        }

        /* The Grid */
        .container { padding: 60px 8%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 40px;
        }

        /* Philosophical Book Card */
        .book-card {
            background: var(--card);
            padding: 15px;
            transition: 0.5s;
            border: 1px solid transparent;
        }

        .book-card:hover {
            border-color: var(--accent);
            background: #1a1a1a;
            transform: translateY(-5px);
        }

        .img-container {
            width: 100%;
            height: 340px;
            overflow: hidden;
            background: #222;
            margin-bottom: 15px;
        }

        .book-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .book-card:hover img { filter: grayscale(0%); }

        .info h3 { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.2rem; 
            margin-bottom: 5px; 
            color: #fff;
        }

        .author { 
            display: block; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            color: var(--accent); 
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .price { font-weight: bold; color: #fff; }

        /* Footer Credits */
        footer {
            padding: 80px 5%;
            background: #000;
            text-align: center;
            border-top: 1px solid #222;
        }

        .dev-box {
            border: 1px solid #333;
            padding: 30px;
            display: inline-block;
        }

        .dev-tag { font-size: 0.7rem; letter-spacing: 4px; color: #555; margin-bottom: 15px; }
        .names { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--accent); }
        .academic-info { font-size: 0.8rem; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VOID BOOKS</div>
        <div class="nav-links">
            <a href="#">Philosophy</a>
            <a href="#">Literature</a>
            <a href="#">Essays</a>
        </div>
    </nav>

    <header class="hero">
        <h1>BEYOND THE ABSURD</h1>
        <p>"To be is to do" — Socrates</p>
    </header>

    <main class="container">
        <div class="grid" id="main-grid">
            </div>
    </main>

    <footer>
        <div class="dev-box">
            <div class="dev-tag">PROJECT CURATED BY</div>
            <div class="names">AMINE DRGHOUI & CHARAFEDDINE EL AOUYNI</div>
            <div class="academic-info">FLSHM UNIVERSITY | English Studies Department | 2026</div>
        </div>
    </footer>

    <script>
        // دقة في الاختيار: أعظم الفلاسفة والروائيين الفلسفيين
        const masters = [
            { title: "Crime and Punishment", author: "Fyodor Dostoevsky", price: "$18.99", img: "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=500" },
            { title: "The Metamorphosis", author: "Franz Kafka", price: "$12.50", img: "https://images.unsplash.com/photo-1543004218-2bc117a12821?w=500" },
            { title: "The Stranger", author: "Albert Camus", price: "$14.00", img: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=500" },
            { title: "Thus Spoke Zarathustra", author: "Friedrich Nietzsche", price: "$20.00", img: "https://images.unsplash.com/photo-1589998059171-988d887df646?w=500" },
            { title: "The Trial", author: "Franz Kafka", price: "$15.00", img: "https://images.unsplash.com/photo-1516979187457-637abb4f9353?w=500" },
            { title: "Phenomenology of Spirit", author: "G.W.F. Hegel", price: "$25.99", img: "https://images.unsplash.com/photo-1532012197367-2d5970d3b593?w=500" },
            { title: "The Myth of Sisyphus", author: "Albert Camus", price: "$13.00", img: "https://images.unsplash.com/photo-1509021436665-8f07dbf5bf1d?w=500" },
            { title: "Being and Nothingness", author: "Jean-Paul Sartre", price: "$22.50", img: "https://images.unsplash.com/photo-1524578271613-d550eabcad51?w=500" }
        ];

        const grid = document.getElementById('main-grid');

        // تكرار ذكي ليصبح المجموع 1000 كتاب
        function loadLibrary() {
            for (let i = 0; i < 125; i++) {
                masters.forEach(book => {
                    const el = document.createElement('div');
                    el.className = 'book-card';
                    el.innerHTML = `
                        <div class="img-container">
                            <img src="${book.img}" alt="${book.title}">
                        </div>
                        <div class="info">
                            <span class="author">${book.author}</span>
                            <h3>${book.title}</h3>
                            <span class="price">${book.price}</span>
                        </div>
                    `;
                    grid.appendChild(el);
                });
            }
        }

        loadLibrary();
    </script>
</body>
</html>
